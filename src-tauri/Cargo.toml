[package]
name = "offspring"
version = "0.5.0-b0002"
description = "Offspring â€” right-click convert videos/images with FFmpeg"
authors = ["Second March"]
edition = "2021"
repository = "https://github.com/second-march/offspring"
homepage = "https://secondmarch.xyz/"
license = "MIT"

[lib]
name = "offspring_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

# Build-variant feature flags.
#
#   (default) standard Offspring. Ships the in-app FFmpeg downloader,
#             minisign-verified GitHub update checker, shell-extension
#             cert import (certutil -> CurrentUser\TrustedPeople), and
#             Add-AppxPackage registration for the Win11 modern menu.
#
#   studio    Offspring Studio. A cert-free, no-outbound-network build
#             for users / admins who want the strictest possible
#             behaviour profile. The HTTP modules (bootstrap.rs +
#             updates.rs) and the cert/MSIX integration paths
#             (modern_menu.rs) are compiled out entirely - the binary
#             literally cannot talk to gyan.dev or github.com, and
#             literally cannot import a certificate. Classic right-
#             click menu still works (HKCU registry only). User
#             obtains FFmpeg manually and points Settings at it.
#
# Build standard: `cargo build --release`
# Build studio:   `cargo build --release --features studio`
[features]
default = []
studio = []

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset"] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
# Single-instance + argv-forwarding IPC: Explorer's classic-menu
# nested sub-verbs only pass the right-clicked file to each
# offspring.exe spawn, so a multi-file selection actually fires N
# separate processes. We hand-roll the singleton dance via Win32
# named mutex + named pipe in `single_instance.rs` so secondaries
# exit BEFORE Tauri/tao boot â€” `tauri-plugin-single-instance` checks
# only after the runtime is up, which produced a brief flash of the
# secondary's hidden message-pump window on screen. See `run()` in
# lib.rs and `single_instance.rs`.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = "1"
thiserror = "1"
# FFmpeg bootstrap: download the LGPL essentials zip from gyan.dev and
# unpack it under %LOCALAPPDATA%\Offspring\ffmpeg\. ureq keeps the TLS
# stack pure-Rust (rustls) so the installer stays self-contained.
ureq = { version = "2", default-features = false, features = ["tls"] }
zip  = { version = "2",  default-features = false, features = ["deflate"] }
# Supply-chain integrity: sha2 verifies the gyan.dev FFmpeg ZIP against
# its published SHA-256 sidecar; minisign-verify checks that the
# downloaded auto-update installer was signed by the offline private key
# whose public counterpart is pinned in `updates.rs`. Both crates are
# small and pure-Rust so they don't pull in C deps or grow the binary
# noticeably.
sha2 = "0.10"
minisign-verify = "0.2"

# Windows-only dependencies. Both `winreg` and `mslnk` ship with
# their own `compile_error!` / `os::windows::*` imports and refuse to
# compile on non-Windows targets. Gating them at the manifest level
# means `cargo check --target aarch64-apple-darwin` doesn't pull
# them in at all, so the macOS build never sees the Windows-side
# code.
#
# Consumers:
#   - winreg: integration/context_menu.rs (HKCU\Software\Classes
#     writes for the classic right-click submenu)
#   - mslnk:  integration/sendto.rs       (SendTo folder shortcuts)
#
# Both consuming modules are also #[cfg(windows)]-gated at the mod
# declaration so the rest of the tree doesn't reference them at all
# on macOS.
[target.'cfg(windows)'.dependencies]
mslnk = "0.1"
winreg = "0.55"

# macOS-only dependencies. objc2 + its Foundation/AppKit bindings let
# us declare a custom Objective-C class for the NSServices provider
# (integration/services_mac.rs). The provider receives "Offspring…"
# right-click invocations from Finder, reads the file URLs out of the
# system pasteboard, and routes them into Tauri's event bus where the
# picker window picks them up. None of this is needed on Windows where
# the right-click flow is registry/MSIX-based instead.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
# objc2-foundation gates its types behind features. The minimum we
# need for services_mac.rs: NSString (comment lookup), NSArray (iter
# over pasteboard items), NSDictionary (msg_send! type parameter),
# NSObject (base class), NSThread (MainThreadMarker plumbing).
objc2-foundation = { version = "0.2", features = ["NSString", "NSArray", "NSDictionary", "NSObject", "NSThread"] }
# objc2-app-kit gates NSApp / NSPasteboard behind their own features.
objc2-app-kit = { version = "0.2", features = ["NSApplication", "NSResponder", "NSPasteboard"] }

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
