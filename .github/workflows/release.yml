name: Release

# Default release flow is LOCAL: build + test via `tools/build-release.ps1`,
# then publish with `gh release create vX.Y.Z installer/dist/Offspring-Setup-X.Y.Z.exe`.
# This workflow is kept as a manual fallback (workflow_dispatch) for the
# occasional rebuild on a clean runner — e.g. to verify a local build was
# reproducible, or to re-attach an installer to an existing tag from CI.
#
# The in-app updater (src-tauri/src/updates.rs) looks for an asset whose name
# starts with "Offspring-Setup" and ends in ".exe" on the latest release.
# Don't rename the asset without updating that matcher.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.3.15). Must already exist on origin."
        required: true

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  build:
    runs-on: windows-latest
    env:
      # Keep the runner's cargo cache on the job's workspace disk so the
      # cache action below actually hits it.
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: npm install
        run: npm ci

      - name: Build app (tauri build)
        run: npm run tauri build

      - name: Build shell-extension DLL
        # Phase 3 crate — produces offspring_shell_ext.dll which the MSIX
        # references via its manifest. The release-time dll ends up in
        # shell-ext/target/release/ (or CARGO_TARGET_DIR/release if the
        # workspace ever starts sharing a target dir).
        shell: pwsh
        run: |
          cd shell-ext
          cargo build --release
          Get-Item target/release/offspring_shell_ext.dll

      - name: Stage shell-ext DLL next to offspring.exe
        # Both artifacts need to live in the install directory at
        # Add-AppxPackage time. Copying it alongside offspring.exe now
        # means the Inno [Files] section picks it up automatically.
        shell: pwsh
        run: Copy-Item shell-ext/target/release/offspring_shell_ext.dll src-tauri/target/release/ -Force

      - name: Build + sign MSIX sparse package
        shell: pwsh
        run: |
          $version = "${{ steps.ver.outputs.version }}.0"
          pwsh installer/msix/build-msix.ps1 -Version $version

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Copy offspring.exe into expected pre-ISS location
        # The Inno script references ..\src-tauri\target\release\offspring.exe
        # relative to installer/. In a default `npm run tauri build` on CI
        # that's exactly where the binary lands.
        shell: pwsh
        run: Get-Item src-tauri/target/release/offspring.exe

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" installer/offspring.iss
          Get-ChildItem installer/dist/

      - name: Create GitHub Release + upload installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Offspring ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            installer/dist/Offspring-Setup-${{ steps.ver.outputs.version }}.exe
